<!DOCTYPE html>
<html>
<head>
  <title>Mobile AR Game</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>

<body>

<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false;"
>

  <!-- Camera -->
  <a-camera gps-camera rotation-reader></a-camera>

  <!-- Dots -->
  <a-sphere position="0 0 -3" radius="0.5" color="red"></a-sphere>
  <a-sphere position="1 0 -4" radius="0.5" color="blue"></a-sphere>
  <a-sphere position="-1 0 -5" radius="0.5" color="green"></a-sphere>

</a-scene>

</body>
</html>
