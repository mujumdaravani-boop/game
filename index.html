<!DOCTYPE html>
<html>
<head>
  <title>AR Dot Game</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body>

<a-scene webxr="optionalFeatures: hit-test, local-floor">

  <!-- Camera (player) -->
  <a-entity id="player" camera position="0 1.6 0"></a-entity>

  <!-- Floor -->
  <a-plane rotation="-90 0 0" width="10" height="10" color="#7BC8A4"></a-plane>

  <!-- Dots -->
  <a-sphere class="dot" position="1 1 -3" radius="0.3" color="red"></a-sphere>
  <a-sphere class="dot" position="-1 1 -4" radius="0.3" color="red"></a-sphere>
  <a-sphere class="dot" position="0 1 -5" radius="0.3" color="red"></a-sphere>
  <a-sphere class="dot" position="2 1 -6" radius="0.3" color="red"></a-sphere>

  <!-- Score text -->
  <a-text id="scoreText" value="Score: 0" position="-1 2 -2" color="black"></a-text>

</a-scene>

<script>
let score = 0;

AFRAME.registerComponent('collector', {
  tick: function () {
    const player = document.querySelector('#player').object3D.position;
    const dots = document.querySelectorAll('.dot');

    dots.forEach(dot => {
      const pos = dot.object3D.position;
      const dist = player.distanceTo(pos);

      if (dist < 1) {
        dot.parentNode.removeChild(dot);
        score++;
        document.querySelector('#scoreText').setAttribute('value', 'Score: ' + score);

        if (document.querySelectorAll('.dot').length === 0) {
          alert("YOU WIN");
          location.reload();
        }
      }
    });
  }
});

// attach to player
document.querySelector('#player').setAttribute('collector', '');

</script>

</body>
</html>
