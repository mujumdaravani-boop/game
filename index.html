<!DOCTYPE html>
<html>
<head>
  <title>AR Collector Pro Multiplayer</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: Arial; }
    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      font-size: 18px;
      z-index: 10;
    }
    #centerUI {
      position: absolute;
      top: 40%;
      width: 100%;
      text-align: center;
      color: white;
      z-index: 10;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div id="ui">
  Score: <span id="score">0</span><br>
  Time: <span id="time">30</span><br>
  Level: <span id="level">1</span>
</div>

<div id="centerUI">
  <h1 id="message">COLLECT THE DOTS</h1>
  <button onclick="startGame()">START</button>
</div>

<a-scene webxr="optionalFeatures: local-floor">

  <a-assets>
    <audio id="collectSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b98fd.mp3"></audio>
  </a-assets>

  <a-entity id="player" camera position="0 1.6 0"></a-entity>

  <a-light type="ambient" intensity="0.7"></a-light>
  <a-light type="directional" position="1 3 2"></a-light>

  <a-plane rotation="-90 0 0" width="20" height="20" color="#111"></a-plane>

</a-scene>

<script>
// 🔥 INSERT YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let playerId = Math.random().toString(36).substr(2, 9);
let playerRef = db.ref("players/" + playerId);

let score = 0;
let timeLeft = 30;
let level = 1;
let gameRunning = false;

// START
function startGame() {
  document.getElementById("centerUI").style.display = "none";
  score = 0;
  timeLeft = 30;
  level = 1;
  gameRunning = true;

  spawnLevel();
  updateUI();

  setInterval(()=>{
    timeLeft--;
    updateUI();
    if(timeLeft<=0) endGame();
  },1000);
}

// SPAWN
function spawnLevel() {
  clearEntities();

  spawnDots(5 + level);
  spawnObstacles(2 + level);
}

// DOTS
function spawnDots(n) {
  for(let i=0;i<n;i++){
    let dot = document.createElement("a-sphere");
    dot.setAttribute("class","dot");
    dot.setAttribute("radius","0.3");
    dot.setAttribute("color","#ff4444");

    let x=(Math.random()*8)-4;
    let z=-(Math.random()*8+2);

    dot.setAttribute("position",`${x} 1 ${z}`);
    document.querySelector("a-scene").appendChild(dot);
  }
}

// OBSTACLES
function spawnObstacles(n){
  for(let i=0;i<n;i++){
    let box=document.createElement("a-box");
    box.setAttribute("class","obstacle");
    box.setAttribute("color","#000");

    let x=(Math.random()*8)-4;
    let z=-(Math.random()*8+2);

    box.setAttribute("position",`${x} 0.5 ${z}`);
    box.setAttribute("moving","");
    document.querySelector("a-scene").appendChild(box);
  }
}

// MOVEMENT
AFRAME.registerComponent("moving",{
  tick:function(t){
    let pos=this.el.object3D.position;
    pos.x+=Math.sin(t/500)*0.02;
  }
});

// GAME LOOP
AFRAME.registerComponent("game",{
  tick:function(){
    if(!gameRunning) return;

    let player=document.querySelector("#player").object3D.position;

    // update multiplayer position
    playerRef.set({
      x:player.x,
      y:player.y,
      z:player.z
    });

    // dots
    document.querySelectorAll(".dot").forEach(dot=>{
      let d=player.distanceTo(dot.object3D.position);
      if(d<1){
        dot.remove();
        score++;
        playSound("collectSound");
        updateUI();

        if(document.querySelectorAll(".dot").length===0){
          level++;
          timeLeft+=10;
          spawnLevel();
        }
      }
    });

    // obstacles
    document.querySelectorAll(".obstacle").forEach(o=>{
      if(player.distanceTo(o.object3D.position)<1){
        endGame();
      }
    });
  }
});

document.querySelector("#player").setAttribute("game","");

// MULTIPLAYER DISPLAY
db.ref("players").on("value",snapshot=>{
  document.querySelectorAll(".other").forEach(e=>e.remove());

  snapshot.forEach(child=>{
    if(child.key===playerId) return;

    let p=child.val();
    let sphere=document.createElement("a-sphere");
    sphere.setAttribute("class","other");
    sphere.setAttribute("radius","0.2");
    sphere.setAttribute("color","blue");
    sphere.setAttribute("position",`${p.x} ${p.y} ${p.z}`);

    document.querySelector("a-scene").appendChild(sphere);
  });
});

// UI
function updateUI(){
  score.innerText=score;
  time.innerText=timeLeft;
  level.innerText=level;
}

// END
function endGame(){
  gameRunning=false;
  document.getElementById("centerUI").style.display="block";
  document.getElementById("message").innerText="GAME OVER";
}

// CLEAN
function clearEntities(){
  document.querySelectorAll(".dot,.obstacle").forEach(e=>e.remove());
}

// SOUND
function playSound(id){
  let s=document.querySelector("#"+id);
  if(s) s.play();
}
</script>

</body>
</html>
