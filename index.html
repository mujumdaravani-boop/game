<!DOCTYPE html>
<html>
<head>
  <title>AR Collector Mobile</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: Arial; }

    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      font-size: 18px;
      z-index: 10;
    }

    #centerUI {
      position: absolute;
      top: 40%;
      width: 100%;
      text-align: center;
      color: white;
      z-index: 10;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div id="ui">
  Score: <span id="score">0</span><br>
  Time: <span id="time">30</span>
</div>

<div id="centerUI">
  <h1 id="message">AR COLLECT GAME</h1>
  <button onclick="startGame()">START</button>
</div>

<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false;"
>

  <!-- Camera -->
  <a-camera id="player"></a-camera>

</a-scene>

<script>
let score = 0;
let timeLeft = 30;
let gameRunning = false;
let timer;

// START GAME
function startGame() {
  document.getElementById("centerUI").style.display = "none";

  score = 0;
  timeLeft = 30;
  gameRunning = true;

  updateUI();
  spawnObjects();

  timer = setInterval(() => {
    timeLeft--;
    updateUI();

    if (timeLeft <= 0) endGame(false);
  }, 1000);
}

// SPAWN OBJECTS
function spawnObjects() {
  clearScene();

  // DOTS
  for (let i = 0; i < 6; i++) {
    let dot = document.createElement('a-sphere');
    dot.setAttribute('class', 'dot');
    dot.setAttribute('radius', '0.4');
    dot.setAttribute('color', 'red');

    let x = (Math.random() * 4) - 2;
    let z = - (Math.random() * 5 + 2);

    dot.setAttribute('position', `${x} 0 ${z}`);
    document.querySelector('a-scene').appendChild(dot);
  }

  // OBSTACLES
  for (let i = 0; i < 3; i++) {
    let box = document.createElement('a-box');
    box.setAttribute('class', 'obstacle');
    box.setAttribute('color', 'black');

    let x = (Math.random() * 4) - 2;
    let z = - (Math.random() * 5 + 2);

    box.setAttribute('position', `${x} 0 ${z}`);
    document.querySelector('a-scene').appendChild(box);
  }
}

// GAME LOOP
AFRAME.registerComponent('game-loop', {
  tick: function () {
    if (!gameRunning) return;

    let player = document.querySelector('#player').object3D.position;

    // DOTS
    document.querySelectorAll('.dot').forEach(dot => {
      let d = player.distanceTo(dot.object3D.position);

      if (d < 1) {
        dot.remove();
        score++;
        updateUI();

        if (document.querySelectorAll('.dot').length === 0) {
          spawnObjects();
        }
      }
    });

    // OBSTACLES
    document.querySelectorAll('.obstacle').forEach(ob => {
      let d = player.distanceTo(ob.object3D.position);

      if (d < 1) {
        endGame(false);
      }
    });
  }
});

// ATTACH LOOP
document.querySelector('#player').setAttribute('game-loop', '');

// UI UPDATE
function updateUI() {
  document.getElementById("score").innerText = score;
  document.getElementById("time").innerText = timeLeft;
}

// END GAME
function endGame(win) {
  gameRunning = false;
  clearInterval(timer);

  document.getElementById("centerUI").style.display = "block";
  document.getElementById("message").innerText = win ? "YOU WIN" : "GAME OVER";

  clearScene();
}

// CLEAR
function clearScene() {
  document.querySelectorAll('.dot, .obstacle').forEach(e => e.remove());
}
</script>

</body>
</html>
